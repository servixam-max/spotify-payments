<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pago Spotify Familiar</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1DB954 0%, #1ed760 100%);
      min-height: 100vh;
      padding: 20px;
      padding-bottom: 100px;
    }
    .header { text-align: center; color: white; margin-bottom: 20px; }
    .header h1 { font-size: 24px; margin-bottom: 5px; }
    .header p { opacity: 0.9; font-size: 14px; }
    .month-selector {
      background: white; border-radius: 16px; padding: 15px;
      margin-bottom: 20px; display: flex; justify-content: space-between;
      align-items: center; box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    .month-selector button {
      background: #1DB954; color: white; border: none;
      padding: 10px 15px; border-radius: 10px; font-size: 16px; cursor: pointer;
    }
    .month-selector span { font-weight: 600; font-size: 16px; text-transform: capitalize; }
    .member-card {
      background: white; border-radius: 16px; padding: 20px;
      margin-bottom: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    .member-header {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 15px;
    }
    .member-name { font-size: 18px; font-weight: 600; color: #191414; }
    .status-badge {
      padding: 6px 12px; border-radius: 20px;
      font-size: 12px; font-weight: 600;
    }
    .status-paid { background: #1DB954; color: white; }
    .status-pending { background: #ff4757; color: white; }
    .status-advance { background: #3498db; color: white; }
    .payment-info {
      background: #f8f9fa; border-radius: 12px;
      padding: 12px; margin-bottom: 15px;
    }
    .payment-info p { font-size: 13px; color: #666; margin-bottom: 5px; }
    .payment-info p:last-child { margin-bottom: 0; }
    .payment-info strong { color: #191414; }
    .btn {
      width: 100%; padding: 12px; border: none; border-radius: 12px;
      font-size: 14px; font-weight: 600; cursor: pointer; transition: transform 0.2s;
    }
    .btn:active { transform: scale(0.98); }
    .btn-pay { background: #1DB954; color: white; }
    .btn-advance { background: #3498db; color: white; margin-top: 8px; }
    .btn-reset { background: #ff4757; color: white; margin-top: 8px; }
    .summary {
      background: white; border-radius: 16px; padding: 20px;
      margin-bottom: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    .summary h2 { font-size: 16px; color: #191414; margin-bottom: 15px; }
    .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .summary-item { text-align: center; padding: 10px; border-radius: 12px; background: #f8f9fa; }
    .summary-item .number { font-size: 24px; font-weight: 700; display: block; }
    .summary-item .label { font-size: 11px; color: #666; text-transform: uppercase; }
    .summary-item.paid .number { color: #1DB954; }
    .summary-item.pending .number { color: #ff4757; }
    .summary-item.advance .number { color: #3498db; }
    .modal {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6); z-index: 1000;
      align-items: center; justify-content: center; padding: 20px;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: white; border-radius: 20px; padding: 25px;
      width: 100%; max-width: 400px;
    }
    .modal-content h3 { margin-bottom: 20px; color: #191414; }
    .modal-content label { display: block; margin-bottom: 8px; font-size: 14px; font-weight: 500; color: #666; }
    .modal-content input, .modal-content select {
      width: 100%; padding: 12px; border: 2px solid #eee;
      border-radius: 12px; font-size: 16px; margin-bottom: 15px;
    }
    .modal-content input:focus, .modal-content select:focus { outline: none; border-color: #1DB954; }
    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
    .modal-actions button { flex: 1; padding: 12px; border: none; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .btn-cancel { background: #f1f3f4; color: #191414; }
    .btn-confirm { background: #1DB954; color: white; }
    .history { margin-top: 10px; padding-top: 10px; border-top: 1px solid #eee; }
    .history-item { font-size: 12px; color: #666; padding: 5px 0; display: flex; justify-content: space-between; }
    .loading { text-align: center; color: white; padding: 20px; }
    .status-bar {
      background: rgba(0,0,0,0.2); color: white;
      padding: 10px; border-radius: 12px; margin-bottom: 20px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .status-dot {
      width: 10px; height: 10px; border-radius: 50%;
      display: inline-block; margin-right: 8px;
    }
    .status-dot.online { background: #1DB954; }
    .status-dot.offline { background: #ff4757; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🎵 Pago Spotify Familiar</h1>
    <p>Gestiona los pagos del plan familiar</p>
  </div>

  <div class="status-bar">
    <span><span class="status-dot" id="statusDot"></span><span id="statusText">Conectando...</span></span>
    <span style="font-size:12px;opacity:0.8" id="serverUrl"></span>
  </div>

  <div class="month-selector">
    <button onclick="changeMonth(-1)">◀</button>
    <span id="currentMonth"></span>
    <button onclick="changeMonth(1)">▶</button>
  </div>

  <div class="summary">
    <h2>📊 Resumen del Mes</h2>
    <div class="summary-grid">
      <div class="summary-item paid">
        <span class="number" id="paidCount">-</span>
        <span class="label">Pagados</span>
      </div>
      <div class="summary-item pending">
        <span class="number" id="pendingCount">-</span>
        <span class="label">Pendientes</span>
      </div>
      <div class="summary-item advance">
        <span class="number" id="advanceCount">-</span>
        <span class="label">Adelanto</span>
      </div>
    </div>
  </div>

  <div id="loading" class="loading">Cargando datos...</div>
  <div id="membersList"></div>

  <!-- Modal para registrar pago -->
  <div class="modal" id="paymentModal">
    <div class="modal-content">
      <h3 id="modalTitle">Registrar Pago</h3>
      <label>Fecha de pago</label>
      <input type="date" id="paymentDate">
      <label>Tipo de pago</label>
      <select id="paymentType">
        <option value="1">Este mes (1 mes)</option>
        <option value="3">3 meses</option>
        <option value="6">6 meses</option>
        <option value="12">1 año (12 meses)</option>
      </select>
      <label>Notas (opcional)</label>
      <input type="text" id="paymentNotes" placeholder="Ej: Transferencia, Bizum...">
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
        <button class="btn-confirm" onclick="confirmPayment()">Confirmar</button>
      </div>
    </div>
  </div>

  <script>
    // Configuración del servidor
    const API_URL = window.location.hostname === 'localhost' 
      ? 'http://localhost:3000/api'
      : `http://${window.location.hostname}:3000/api`;

    // Estado
    const members = ['Rubén', 'María', 'Litri', 'Kika', 'Gordi'];
    let currentDate = new Date();
    let selectedMember = null;
    let allPayments = [];
    let isConnected = false;

    // Verificar conexión
    async function checkConnection() {
      try {
        const res = await fetch(`${API_URL}/payments`);
        if (res.ok) {
          isConnected = true;
          document.getElementById('statusDot').className = 'status-dot online';
          document.getElementById('statusText').textContent = 'Conectado';
          document.getElementById('serverUrl').textContent = API_URL;
          loadData();
        } else {
          throw new Error('Server error');
        }
      } catch (err) {
        isConnected = false;
        document.getElementById('statusDot').className = 'status-dot offline';
        document.getElementById('statusText').textContent = 'Sin conexión - Verifica que el servidor esté corriendo';
        document.getElementById('loading').textContent = '❌ No se puede conectar al servidor. Asegúrate de ejecutar: docker-compose up';
      }
    }

    // Cargar datos
    async function loadData() {
      try {
        const res = await fetch(`${API_URL}/payments`);
        if (!res.ok) throw new Error('Error fetching');
        allPayments = await res.json();
        renderMembers();
      } catch (err) {
        console.error('Error loading:', err);
      }
    }

    // Guardar pago
    async function savePayment(member, date, months, notes) {
      const res = await fetch(`${API_URL}/payments`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ member, payment_date: date, months, notes })
      });
      if (!res.ok) throw new Error('Error saving');
      return await res.json();
    }

    // Borrar pagos de miembro
    async function deleteMemberPayments(member) {
      const res = await fetch(`${API_URL}/payments/member/${encodeURIComponent(member)}`, {
        method: 'DELETE'
      });
      if (!res.ok) throw new Error('Error deleting');
    }

    // Formatear fecha
    function formatDate(dateStr) {
      const date = new Date(dateStr);
      return date.toLocaleDateString('es-ES', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    // Obtener clave de mes
    function getMonthKey(date) {
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
    }

    // Calcular meses adelantados
    function calculateAdvance(memberPayments) {
      let advance = 0;
      const sorted = [...memberPayments].sort((a, b) => new Date(b.payment_date) - new Date(a.payment_date));
      for (const p of sorted) {
        if (p.months > 1) advance += p.months - 1;
      }
      return advance;
    }

    // Renderizar miembros
    function renderMembers() {
      const monthKey = getMonthKey(currentDate);
      const container = document.getElementById('membersList');
      
      let html = '';
      
      members.forEach(member => {
        const memberPayments = allPayments.filter(p => p.member === member);
        const monthPayments = memberPayments.filter(p => getMonthKey(p.payment_date) === monthKey);
        const latestPayment = monthPayments.length > 0 ? monthPayments[monthPayments.length - 1] : null;
        const advanceMonths = calculateAdvance(memberPayments);
        
        let status = 'pending';
        let statusText = 'Pendiente';
        let advanceInfo = '';
        
        if (advanceMonths > 0) {
          status = 'advance';
          statusText = `${advanceMonths} meses adelantados`;
          advanceInfo = `📅 Adelanto hasta: ${getAdvanceEndDate(advanceMonths)}`;
        } else if (latestPayment) {
          status = 'paid';
          statusText = 'Pagado';
        }
        
        html += `
          <div class="member-card">
            <div class="member-header">
              <span class="member-name">${member}</span>
              <span class="status-badge status-${status}">${statusText}</span>
            </div>
            
            ${latestPayment || advanceMonths > 0 ? `
              <div class="payment-info">
                ${latestPayment ? `
                  <p>📅 Última fecha: <strong>${formatDate(latestPayment.payment_date)}</strong></p>
                  <p>💰 Tipo: <strong>${getPaymentTypeText(latestPayment.months)}</strong></p>
                  ${latestPayment.notes ? `<p>📝 Notas: ${latestPayment.notes}</p>` : ''}
                ` : ''}
                ${advanceInfo}
                ${memberPayments.length > 0 ? `
                  <div class="history">
                    <p style="font-size:11px;color:#999;margin-bottom:5px;">HISTORIAL RECIENTE</p>
                    ${memberPayments.slice(-3).reverse().map(p => `
                      <div class="history-item">
                        <span>${formatDate(p.payment_date)}</span>
                        <span>${getPaymentTypeText(p.months)}</span>
                      </div>
                    `).join('')}
                  </div>
                ` : ''}
              </div>
            ` : `
              <div class="payment-info">
                <p style="color:#999;">Sin pagos registrados</p>
              </div>
            `}
            
            <button class="btn btn-pay" onclick="openModal('${member}', 'pay')">
              ${latestPayment || advanceMonths > 0 ? '✅ Registrar otro pago' : '💰 Registrar pago'}
            </button>
            ${advanceMonths > 0 ? `
              <button class="btn btn-advance" onclick="openModal('${member}', 'advance')">
                ➕ Añadir más meses
              </button>
            ` : ''}
            ${latestPayment || advanceMonths > 0 ? `
              <button class="btn btn-reset" onclick="resetMember('${member}')">
                🔄 Resetear
              </button>
            ` : ''}
          </div>
        `;
      });
      
      container.innerHTML = html;
      updateSummary();
    }

    // Obtener texto del tipo de pago
    function getPaymentTypeText(months) {
      const types = { '1': 'Este mes', '3': '3 meses', '6': '6 meses', '12': '1 año' };
      return types[months] || `${months} meses`;
    }

    // Calcular fecha final de adelanto
    function getAdvanceEndDate(months) {
      const date = new Date(currentDate);
      date.setMonth(date.getMonth() + months);
      return date.toLocaleDateString('es-ES', { month: 'long', year: 'numeric' });
    }

    // Actualizar resumen
    function updateSummary() {
      const monthKey = getMonthKey(currentDate);
      let paid = 0, pending = 0, advance = 0;
      
      members.forEach(member => {
        const memberPayments = allPayments.filter(p => p.member === member);
        const advanceMonths = calculateAdvance(memberPayments);
        const monthPayments = memberPayments.filter(p => getMonthKey(p.payment_date) === monthKey);
        
        if (advanceMonths > 0) advance++;
        else if (monthPayments.length > 0) paid++;
        else pending++;
      });
      
      document.getElementById('paidCount').textContent = paid;
      document.getElementById('pendingCount').textContent = pending;
      document.getElementById('advanceCount').textContent = advance;
    }

    // Cambiar mes
    function changeMonth(delta) {
      currentDate.setMonth(currentDate.getMonth() + delta);
      document.getElementById('currentMonth').textContent = 
        currentDate.toLocaleDateString('es-ES', { month: 'long', year: 'numeric' });
      renderMembers();
    }

    // Abrir modal
    function openModal(member, type) {
      selectedMember = member;
      document.getElementById('modalTitle').textContent = 
        type === 'advance' ? `Añadir adelanto - ${member}` : `Registrar pago - ${member}`;
      document.getElementById('paymentDate').value = new Date().toISOString().split('T')[0];
      document.getElementById('paymentType').value = '1';
      document.getElementById('paymentNotes').value = '';
      document.getElementById('paymentModal').classList.add('active');
    }

    // Cerrar modal
    function closeModal() {
      document.getElementById('paymentModal').classList.remove('active');
      selectedMember = null;
    }

    // Confirmar pago
    async function confirmPayment() {
      const date = document.getElementById('paymentDate').value;
      const months = parseInt(document.getElementById('paymentType').value);
      const notes = document.getElementById('paymentNotes').value;
      
      if (!date || !selectedMember) return;
      
      try {
        await savePayment(selectedMember, date, months, notes);
        await loadData();
        closeModal();
      } catch (err) {
        alert('Error guardando: ' + err.message);
      }
    }

    // Resetear miembro
    async function resetMember(member) {
      if (confirm(`¿Borrar todos los pagos de ${member}?`)) {
        try {
          await deleteMemberPayments(member);
          await loadData();
        } catch (err) {
          alert('Error: ' + err.message);
        }
      }
    }

    // Inicializar
    document.getElementById('currentMonth').textContent = 
      currentDate.toLocaleDateString('es-ES', { month: 'long', year: 'numeric' });

    // Check conexión y cargar datos
    checkConnection();
    
    // Auto-refresh cada minuto
    setInterval(loadData, 60000);
  </script>
</body>
</html>
