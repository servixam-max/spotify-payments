<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Spotify Familiar</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #000;
      color: #fff;
      min-height: 100vh;
      padding-bottom: 60px;
    }
    
    /* Header */
    .header {
      background: linear-gradient(180deg, #1DB954 0%, #1DB954 60%, transparent 100%);
      padding: 40px 20px 120px;
      position: relative;
      overflow: hidden;
    }
    .header::before {
      content: '';
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 60%);
      animation: rotateBg 20s linear infinite;
    }
    @keyframes rotateBg { to { transform: rotate(360deg); } }
    .header h1 { font-size: 32px; font-weight: 800; margin-bottom: 8px; position: relative; z-index: 1; }
    .header p { opacity: 0.9; font-size: 15px; position: relative; z-index: 1; }
    
    /* Actions bar */
    .actions-bar {
      margin: -70px 16px 16px;
      padding: 14px 18px;
      background: rgba(30,30,30,0.95);
      backdrop-filter: blur(20px);
      border-radius: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid rgba(255,255,255,0.1);
      position: relative;
      z-index: 10;
    }
    .status-info { display: flex; align-items: center; gap: 8px; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #1DB954; box-shadow: 0 0 10px #1DB954; }
    .status-text { font-size: 13px; font-weight: 600; }
    .action-btn {
      background: rgba(255,255,255,0.1);
      color: #fff;
      border: none;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      margin-left: 8px;
    }
    .action-btn:active { background: #1DB954; }
    
    /* View toggle */
    .view-toggle {
      margin: 0 16px 16px;
      display: flex;
      gap: 8px;
      background: rgba(30,30,30,0.8);
      padding: 5px;
      border-radius: 12px;
    }
    .view-btn {
      flex: 1;
      padding: 13px;
      border: none;
      border-radius: 9px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      background: transparent;
      color: #777;
    }
    .view-btn.active {
      background: #1DB954;
      color: #000;
    }
    
    /* Month selector */
    .month-selector {
      margin: 0 16px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(30,30,30,0.9);
      padding: 16px 20px;
      border-radius: 14px;
    }
    .month-selector button {
      background: #1DB954;
      color: #000;
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
    }
    .month-selector span { font-weight: 700; font-size: 15px; text-transform: capitalize; }
    
    /* Summary */
    .summary {
      margin: 0 16px 16px;
      padding: 20px;
      background: rgba(30,30,30,0.9);
      border-radius: 16px;
    }
    .summary h2 { font-size: 14px; color: #999; margin-bottom: 16px; text-transform: uppercase; }
    .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .summary-item { 
      text-align: center; 
      padding: 16px 10px; 
      background: linear-gradient(135deg, rgba(10,10,10,0.9) 0%, rgba(20,20,20,0.9) 100%);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.05);
      transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    .summary-item:active { transform: scale(0.95); }
    .summary-item .number { animation: numberPop 0.5s cubic-bezier(0.4,0,0.2,1); }
    @keyframes numberPop {
      0% { transform: scale(0.5); opacity: 0; }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); opacity: 1; }
    }
    .summary-item .number { font-size: 32px; font-weight: 800; display: block; margin-bottom: 4px; }
    .summary-item .label { font-size: 10px; color: #777; text-transform: uppercase; }
    .summary-item.paid .number { color: #1DB954; }
    .summary-item.pending .number { color: #ff4757; }
    .summary-item.advance .number { color: #3498db; }
    
    /* Progress bars */
    .progress-section { margin: 0 16px 16px; }
    .progress-item { margin-bottom: 12px; }
    .progress-header { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 12px; font-weight: 700; color: #999; }
    .progress-bar { height: 8px; background: rgba(255,255,255,0.08); border-radius: 4px; overflow: hidden; }
    .progress-fill { 
      height: 100%; 
      border-radius: 4px; 
      transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
      position: relative;
      overflow: hidden;
    }
    .progress-fill::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.2) 50%, transparent 100%);
      animation: shimmer 2s ease-in-out infinite;
    }
    @keyframes shimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }
    .progress-fill.paid { background: linear-gradient(90deg, #1DB954 0%, #1ed760 100%); box-shadow: 0 0 15px rgba(29,185,84,0.5); }
    .progress-fill.pending { background: linear-gradient(90deg, #ff4757 0%, #ff6b7a 100%); box-shadow: 0 0 15px rgba(255,71,87,0.5); }
    
    /* Quick actions */
    .quick-actions {
      margin: 0 16px 16px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .quick-action-btn {
      background: rgba(30,30,30,0.8);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 16px 10px;
      border-radius: 14px;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .quick-action-btn:active { background: #1DB954; color: #000; }
    .quick-action-btn span { font-size: 26px; }
    
    /* Member card */
    .member-card {
      margin: 0 16px 14px;
      background: linear-gradient(135deg, rgba(30,30,30,0.98) 0%, rgba(20,20,20,0.98) 100%);
      border-radius: 16px;
      padding: 20px;
      border: 1px solid rgba(255,255,255,0.08);
      animation: cardSlideUp 0.5s cubic-bezier(0.4,0,0.2,1) backwards;
    }
    .member-card:nth-child(1) { animation-delay: 0.05s; }
    .member-card:nth-child(2) { animation-delay: 0.1s; }
    .member-card:nth-child(3) { animation-delay: 0.15s; }
    .member-card:nth-child(4) { animation-delay: 0.2s; }
    .member-card:nth-child(5) { animation-delay: 0.25s; }
    @keyframes cardSlideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .member-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .member-name { font-size: 20px; font-weight: 800; }
    .member-total { font-size: 12px; color: #777; margin-top: 4px; }
    .member-total strong { color: #1DB954; }
    .status-badge { padding: 6px 14px; border-radius: 20px; font-size: 11px; font-weight: 800; text-transform: uppercase; }
    .status-paid { background: #1DB954; color: #000; }
    .status-pending { background: #ff4757; color: #fff; }
    .status-advance { background: #3498db; color: #fff; }
    
    .payment-info { background: rgba(10,10,10,0.8); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    .payment-info p { font-size: 13px; color: #999; margin-bottom: 8px; }
    .payment-info strong { color: #fff; }
    
    .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-size: 14px; font-weight: 800; cursor: pointer; text-transform: uppercase; }
    .btn-pay { background: #1DB954; color: #000; }
    .btn-reset { background: transparent; border: 2px solid rgba(255,71,87,0.5); color: #ff4757; margin-top: 10px; }
    
    /* Year selector */
    .year-selector {
      margin: 0 16px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(30,30,30,0.9);
      padding: 16px 20px;
      border-radius: 14px;
    }
    .year-selector button { background: #1DB954; color: #000; border: none; width: 40px; height: 40px; border-radius: 50%; font-size: 18px; }
    .year-selector span { font-weight: 800; font-size: 20px; }
    
    /* Stats cards */
    .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin: 0 16px 16px; }
    .stat-card { 
      background: rgba(30,30,30,0.95); 
      border-radius: 14px; 
      padding: 18px; 
      border: 1px solid rgba(255,255,255,0.08);
      animation: statPop 0.5s cubic-bezier(0.4,0,0.2,1);
      transform-origin: center;
    }
    @keyframes statPop {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
    .stat-card .label { font-size: 10px; color: #777; text-transform: uppercase; margin-bottom: 8px; }
    .stat-card .value { font-size: 24px; font-weight: 800; }
    .stat-card .value.green { color: #1DB954; }
    .stat-card .value.blue { color: #3498db; }
    .stat-card .value.purple { color: #9b59b6; }
    
    /* Chart */
    .charts-section { margin: 0 16px 16px; }
    .chart-card { background: rgba(30,30,30,0.95); border-radius: 16px; padding: 20px; border: 1px solid rgba(255,255,255,0.08); }
    .chart-card h3 { font-size: 14px; color: #999; margin-bottom: 16px; text-transform: uppercase; }
    .chart-container { position: relative; height: 200px; }
    
    /* Yearly grid */
    .yearly-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin: 0 16px 16px; }
    .yearly-member { background: rgba(30,30,30,0.95); border-radius: 14px; padding: 18px; border: 1px solid rgba(255,255,255,0.08); }
    .yearly-member h3 { font-size: 16px; margin-bottom: 12px; }
    .yearly-stats { display: flex; gap: 6px; font-size: 11px; color: #777; flex-wrap: wrap; }
    .yearly-stats span { background: rgba(10,10,10,0.8); padding: 8px 12px; border-radius: 8px; }
    .yearly-stats strong { color: #1DB954; font-size: 16px; }
    
    /* Modal */
    .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: flex-end; justify-content: center; }
    .modal.active { display: flex; }
    .modal-content { background: #2a2a2a; border-radius: 20px 20px 0 0; padding: 26px; width: 100%; max-width: 500px; }
    .modal-content h3 { margin-bottom: 20px; font-size: 20px; }
    .modal-content label { display: block; margin-bottom: 8px; font-size: 12px; color: #999; font-weight: 700; text-transform: uppercase; }
    .modal-content input, .modal-content select { width: 100%; padding: 14px; border: 2px solid rgba(255,255,255,0.1); border-radius: 12px; font-size: 16px; margin-bottom: 16px; background: rgba(10,10,10,0.8); color: #fff; }
    .modal-content input:focus { outline: none; border-color: #1DB954; }
    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
    .modal-actions button { flex: 1; padding: 15px; border: none; border-radius: 12px; font-size: 14px; font-weight: 700; }
    .btn-cancel { background: rgba(255,255,255,0.1); color: #fff; }
    .btn-confirm { background: #1DB954; color: #000; }
    
    /* Loading */
    .loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); z-index: 2000; display: none; align-items: center; justify-content: center; flex-direction: column; gap: 20px; }
    .loading-overlay.active { display: flex; }
    .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top-color: #1DB954; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { color: #fff; font-size: 14px; font-weight: 700; text-transform: uppercase; }
    
    /* Empty state */
    .empty-state { text-align: center; padding: 80px 20px; color: #666; }
    .empty-state-icon { font-size: 64px; margin-bottom: 20px; opacity: 0.5; }
    .empty-state h3 { font-size: 18px; margin-bottom: 10px; color: #888; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🎵 Spotify</h1>
    <p>Plan Familiar</p>
  </div>

  <div class="actions-bar">
    <div class="status-info">
      <span class="status-dot" id="statusDot"></span>
      <span class="status-text" id="statusText">Cargando...</span>
    </div>
    <div>
      <button class="action-btn" onclick="refreshData()" title="Actualizar">🔄</button>
      <button class="action-btn" onclick="exportCSV()" title="Exportar">📤</button>
    </div>
  </div>

  <div class="view-toggle">
    <button class="view-btn active" id="btnMonthly" onclick="setView('monthly')">📅 Mensual</button>
    <button class="view-btn" id="btnYearly" onclick="setView('yearly')">📊 Anual</button>
  </div>

  <!-- Vista Mensual -->
  <div id="monthlyView">
    <div class="month-selector">
      <button onclick="changeMonth(-1)">◀</button>
      <span id="currentMonth"></span>
      <button onclick="changeMonth(1)">▶</button>
    </div>

    <div class="summary">
      <h2>📊 Resumen</h2>
      <div class="summary-grid">
        <div class="summary-item paid">
          <span class="number" id="paidCount">-</span>
          <span class="label">Pagados</span>
        </div>
        <div class="summary-item pending">
          <span class="number" id="pendingCount">-</span>
          <span class="label">Pendientes</span>
        </div>
        <div class="summary-item advance">
          <span class="number" id="advanceCount">-</span>
          <span class="label">Adelanto</span>
        </div>
      </div>
    </div>

    <!-- Progress -->
    <div class="progress-section">
      <div class="progress-item">
        <div class="progress-header"><span>🟢 Pagados</span><span id="progressPaidText">0%</span></div>
        <div class="progress-bar"><div class="progress-fill paid" id="progressPaid" style="width:0%"></div></div>
      </div>
      <div class="progress-item">
        <div class="progress-header"><span>🔴 Pendientes</span><span id="progressPendingText">0%</span></div>
        <div class="progress-bar"><div class="progress-fill pending" id="progressPending" style="width:0%"></div></div>
      </div>
    </div>

    <!-- Quick actions -->
    <div class="quick-actions">
      <button class="quick-action-btn" onclick="openModal('Rubén')"><span>👤</span>Rubén</button>
      <button class="quick-action-btn" onclick="openModal('María')"><span>👤</span>María</button>
      <button class="quick-action-btn" onclick="openModal('Litri')"><span>👤</span>Litri</button>
      <button class="quick-action-btn" onclick="openModal('Kika')"><span>👤</span>Kika</button>
      <button class="quick-action-btn" onclick="openModal('Gordi')"><span>👤</span>Gordi</button>
      <button class="quick-action-btn" onclick="refreshData()"><span>🔄</span>Actualizar</button>
    </div>

    <div id="membersList"></div>
  </div>

  <!-- Vista Anual -->
  <div id="yearlyView" style="display:none;">
    <div class="year-selector">
      <button onclick="changeYear(-1)">◀</button>
      <span id="currentYear"></span>
      <button onclick="changeYear(1)">▶</button>
    </div>
    
    <div class="stats-grid">
      <div class="stat-card"><div class="label">Total Pagos</div><div class="value green" id="yearTotalPayments">0</div></div>
      <div class="stat-card"><div class="label">Total Meses</div><div class="value blue" id="yearTotalMonths">0</div></div>
      <div class="stat-card"><div class="label">Mejor Pagador</div><div class="value purple" id="yearBestPayer">-</div></div>
      <div class="stat-card"><div class="label">Recaudado</div><div class="value green" id="yearCollected">0€</div></div>
    </div>
    
    <div class="charts-section">
      <div class="chart-card">
        <h3>📊 Pagos por Persona</h3>
        <div class="chart-container"><canvas id="yearlyChart"></canvas></div>
      </div>
    </div>
    
    <div class="yearly-grid" id="yearlyList"></div>
  </div>

  <!-- Modal -->
  <div class="modal" id="paymentModal">
    <div class="modal-content">
      <h3 id="modalTitle">Registrar Pago</h3>
      <label>Fecha</label>
      <input type="date" id="paymentDate">
      <label>Meses (1-24)</label>
      <input type="number" id="paymentMonths" value="1" min="1" max="24">
      <label>Método</label>
      <select id="paymentMethod">
        <option value="Bizum">💚 Bizum</option>
        <option value="Transferencia">💳 Transferencia</option>
        <option value="Efectivo">💵 Efectivo</option>
        <option value="Otro">📝 Otro</option>
      </select>
      <label>Notas</label>
      <input type="text" id="paymentNotes" placeholder="Opcional">
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
        <button class="btn-confirm" onclick="confirmPayment()">Confirmar</button>
      </div>
    </div>
  </div>

  <!-- Loading -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-text" id="loadingText">Guardando...</div>
  </div>

  <script>
    const API_URL = window.location.hostname === 'localhost' ? 'http://localhost:3000/api' : `${window.location.protocol}//${window.location.hostname}/api`;
    const members = ['Rubén', 'María', 'Litri', 'Kika', 'Gordi'];
    let currentDate = new Date();
    let currentYear = new Date().getFullYear();
    let selectedMember = null;
    let allPayments = [];
    let yearlyChart = null;

    // Cargar datos
    async function loadData() {
      try {
        const res = await fetch(`${API_URL}/payments`);
        if (!res.ok) throw new Error('Error');
        const data = await res.json();
        allPayments = data.map(p => ({ ...p, payment_date: new Date(p.payment_date) }));
        document.getElementById('statusDot').style.background = '#1DB954';
        document.getElementById('statusText').textContent = 'Conectado';
        if (document.getElementById('monthlyView').style.display !== 'none') {
          renderMembers();
        } else {
          renderYearly();
        }
      } catch (err) {
        document.getElementById('statusDot').style.background = '#ff4757';
        document.getElementById('statusText').textContent = 'Error: ' + err.message;
      }
    }

    // Refresh manual
    async function refreshData() {
      document.getElementById('loadingText').textContent = 'Actualizando...';
      document.getElementById('loadingOverlay').classList.add('active');
      await loadData();
      document.getElementById('loadingOverlay').classList.remove('active');
    }

    // Cambiar vista
    function setView(view) {
      const monthlyView = document.getElementById('monthlyView');
      const yearlyView = document.getElementById('yearlyView');
      const btnMonthly = document.getElementById('btnMonthly');
      const btnYearly = document.getElementById('btnYearly');
      
      if (view === 'monthly') {
        monthlyView.style.display = 'block';
        yearlyView.style.display = 'none';
        btnMonthly.classList.add('active');
        btnYearly.classList.remove('active');
        renderMembers();
      } else {
        monthlyView.style.display = 'none';
        yearlyView.style.display = 'block';
        btnMonthly.classList.remove('active');
        btnYearly.classList.add('active');
        renderYearly();
      }
      window.scrollTo(0, 0);
    }

    // Render mensual
    function renderMembers() {
      const monthKey = `${currentDate.getFullYear()}-${String(currentDate.getMonth()+1).padStart(2,'0')}`;
      const container = document.getElementById('membersList');
      let html = '';

      members.forEach(member => {
        const memberPayments = allPayments.filter(p => p.member === member);
        const monthPayments = memberPayments.filter(p => {
          const d = p.payment_date instanceof Date ? p.payment_date : new Date(p.payment_date);
          return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}` === monthKey;
        });
        const latestPayment = monthPayments.length > 0 ? monthPayments[monthPayments.length - 1] : null;
        const advanceMonths = memberPayments.reduce((sum, p) => sum + (p.months > 1 ? p.months - 1 : 0), 0);
        const totalPaid = memberPayments.reduce((sum, p) => sum + (p.months || 1), 0);

        let status = 'pending', statusText = 'Pendiente';
        if (advanceMonths > 0) { status = 'advance'; statusText = `${advanceMonths} meses adel.`; }
        else if (latestPayment) { status = 'paid'; statusText = 'Pagado'; }

        html += `<div class="member-card">
          <div class="member-header">
            <div><div class="member-name">${member}</div><div class="member-total">Total: <strong>${totalPaid}</strong> meses</div></div>
            <span class="status-badge status-${status}">${statusText}</span>
          </div>`;
        
        if (latestPayment || advanceMonths > 0) {
          html += `<div class="payment-info">`;
          if (latestPayment) {
            const d = latestPayment.payment_date instanceof Date ? latestPayment.payment_date : new Date(latestPayment.payment_date);
            html += `<p>📅 <strong>${d.toLocaleDateString('es-ES', {day:'numeric',month:'short',year:'numeric'})}</strong></p>`;
            html += `<p>💰 <strong>${latestPayment.months === 1 ? 'Este mes' : latestPayment.months + ' meses'}</strong></p>`;
            if (latestPayment.method) html += `<p>🏦 <strong>${latestPayment.method}</strong></p>`;
          }
          if (advanceMonths > 0) html += `<p>📅 <strong>${advanceMonths} meses adelantados</strong></p>`;
          html += `</div>`;
        } else {
          html += `<div class="payment-info"><p style="color:#666;">Sin pagos registrados</p></div>`;
        }

        html += `<button class="btn btn-pay" onclick="openModal('${member}')">${latestPayment || advanceMonths > 0 ? '✅ Registrar otro' : '💰 Registrar pago'}</button>`;
        if (memberPayments.length > 0) html += `<button class="btn btn-reset" onclick="resetMember('${member}')">🔄 Resetear</button>`;
        html += `</div>`;
      });

      container.innerHTML = html;
      updateSummary();
    }

    // Render anual
    function renderYearly() {
      const container = document.getElementById('yearlyList');
      let html = '';
      let totalPayments = 0, totalMonths = 0, bestPayer = '-', maxMonths = 0;
      const memberStats = {};

      members.forEach(member => {
        const memberPayments = allPayments.filter(p => {
          const d = p.payment_date instanceof Date ? p.payment_date : new Date(p.payment_date);
          return p.member === member && d.getFullYear() === currentYear;
        });
        const mMonths = memberPayments.reduce((sum, p) => sum + (p.months || 1), 0);
        const mPayments = memberPayments.length;
        memberStats[member] = mMonths;
        totalPayments += mPayments;
        totalMonths += mMonths;
        if (mMonths > maxMonths) { maxMonths = mMonths; bestPayer = member; }

        html += `<div class="yearly-member"><h3>${member}</h3><div class="yearly-stats">
          <span>📦 <strong>${mPayments}</strong></span>
          <span>📅 <strong>${mMonths}</strong></span>
        </div></div>`;
      });

      container.innerHTML = html;
      
      // Animar stats cards
      const statsCards = document.querySelectorAll('.stat-card');
      statsCards.forEach((card, i) => {
        card.style.animationDelay = `${i * 0.1}s`;
      });
      
      document.getElementById('yearTotalPayments').textContent = totalPayments;
      document.getElementById('yearTotalMonths').textContent = totalMonths;
      document.getElementById('yearBestPayer').textContent = bestPayer;
      document.getElementById('yearCollected').textContent = (totalMonths * 3.50).toFixed(2) + '€';

      // Gráfica
      setTimeout(() => {
        const ctx = document.getElementById('yearlyChart').getContext('2d');
        if (yearlyChart) yearlyChart.destroy();
        yearlyChart = new Chart(ctx, {
          type: 'bar',
          data: {
            labels: members,
            datasets: [{
              data: members.map(m => memberStats[m] || 0),
              backgroundColor: 'rgba(29,185,84,0.9)',
              borderColor: '#1DB954',
              borderWidth: 2,
              borderRadius: 8
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
              y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.06)' }, ticks: { color: '#888', stepSize: 1 } },
              x: { grid: { display: false }, ticks: { color: '#888' } }
            }
          }
        });
      }, 50);
    }

    // Actualizar resumen
    function updateSummary() {
      const monthKey = `${currentDate.getFullYear()}-${String(currentDate.getMonth()+1).padStart(2,'0')}`;
      let paid = 0, pending = 0, advance = 0;

      members.forEach(member => {
        const memberPayments = allPayments.filter(p => p.member === member);
        const advanceMonths = memberPayments.reduce((sum, p) => sum + (p.months > 1 ? p.months - 1 : 0), 0);
        const monthPayments = memberPayments.filter(p => {
          const d = p.payment_date instanceof Date ? p.payment_date : new Date(p.payment_date);
          return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}` === monthKey;
        });
        if (advanceMonths > 0) advance++;
        else if (monthPayments.length > 0) paid++;
        else pending++;
      });

      document.getElementById('paidCount').textContent = paid;
      document.getElementById('pendingCount').textContent = pending;
      document.getElementById('advanceCount').textContent = advance;

      const total = paid + pending + advance;
      const paidPct = total > 0 ? Math.round((paid / total) * 100) : 0;
      const pendingPct = total > 0 ? Math.round((pending / total) * 100) : 0;
      document.getElementById('progressPaid').style.width = paidPct + '%';
      document.getElementById('progressPaidText').textContent = paidPct + '%';
      document.getElementById('progressPending').style.width = pendingPct + '%';
      document.getElementById('progressPendingText').textContent = pendingPct + '%';
    }

    // Cambiar mes/año
    function changeMonth(delta) {
      currentDate.setMonth(currentDate.getMonth() + delta);
      document.getElementById('currentMonth').textContent = currentDate.toLocaleDateString('es-ES', { month: 'long', year: 'numeric' });
      renderMembers();
    }
    function changeYear(delta) {
      currentYear += delta;
      document.getElementById('currentYear').textContent = currentYear;
      renderYearly();
    }

    // Modal
    function openModal(member) {
      selectedMember = member;
      document.getElementById('modalTitle').textContent = `Registrar pago - ${member}`;
      document.getElementById('paymentDate').value = new Date().toISOString().split('T')[0];
      document.getElementById('paymentMonths').value = '1';
      document.getElementById('paymentModal').classList.add('active');
    }
    function closeModal() { document.getElementById('paymentModal').classList.remove('active'); selectedMember = null; }

    // Confirmar pago
    async function confirmPayment() {
      const date = document.getElementById('paymentDate').value;
      const months = parseInt(document.getElementById('paymentMonths').value);
      const method = document.getElementById('paymentMethod').value;
      const notes = document.getElementById('paymentNotes').value;

      if (!date || !selectedMember) return;

      document.getElementById('loadingText').textContent = 'Guardando...';
      document.getElementById('loadingOverlay').classList.add('active');

      try {
        await fetch(`${API_URL}/payments`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ member: selectedMember, payment_date: date, months, method, notes })
        });
        await loadData();
        closeModal();
      } catch (err) {
        alert('Error: ' + err.message);
      } finally {
        document.getElementById('loadingOverlay').classList.remove('active');
      }
    }

    // Resetear miembro
    async function resetMember(member) {
      if (confirm(`¿Borrar todos los pagos de ${member}?`)) {
        document.getElementById('loadingText').textContent = 'Eliminando...';
        document.getElementById('loadingOverlay').classList.add('active');
        try {
          await fetch(`${API_URL}/payments/member/${encodeURIComponent(member)}`, { method: 'DELETE' });
          await loadData();
        } catch (err) {
          alert('Error: ' + err.message);
        } finally {
          document.getElementById('loadingOverlay').classList.remove('active');
        }
      }
    }

    // Exportar CSV
    function exportCSV() {
      if (allPayments.length === 0) { alert('No hay pagos'); return; }
      const headers = ['ID','Miembro','Fecha','Meses','Método','Notas'];
      const rows = allPayments.map(p => [p.id, p.member, new Date(p.payment_date).toLocaleDateString('es-ES'), p.months, p.method||'-', p.notes||'-'].join(';'));
      const csv = [headers.join(';'), ...rows].join('\n');
      const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = `spotify-pagos-${new Date().toISOString().split('T')[0]}.csv`;
      link.click();
    }

    // Inicializar
    document.getElementById('currentMonth').textContent = currentDate.toLocaleDateString('es-ES', { month: 'long', year: 'numeric' });
    document.getElementById('currentYear').textContent = currentYear;
    loadData();
  </script>
</body>
</html>
