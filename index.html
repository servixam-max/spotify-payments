<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Spotify Familiar</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #000;
      color: #fff;
      min-height: 100vh;
      padding-bottom: 60px;
      overflow-x: hidden;
    }
    
    /* Animated background */
    .bg-animation {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: 
        radial-gradient(ellipse at 20% 20%, rgba(29,185,84,0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(29,185,84,0.1) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(20,20,20,0.8) 0%, #000 100%);
      z-index: -1;
      animation: bgPulse 8s ease-in-out infinite;
    }
    @keyframes bgPulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(1.05); }
    }
    
    /* Header premium */
    .header {
      background: linear-gradient(180deg, #1DB954 0%, #0d6630 100%);
      padding: 50px 20px 150px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(29,185,84,0.3);
    }
    .header::before {
      content: '';
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: 
        radial-gradient(circle at 50% 50%, rgba(255,255,255,0.2) 0%, transparent 60%),
        linear-gradient(45deg, transparent 45%, rgba(255,255,255,0.1) 50%, transparent 55%);
      animation: rotateBg 15s linear infinite;
    }
    @keyframes rotateBg { to { transform: rotate(360deg); } }
    .header h1 { 
      font-size: 36px; 
      font-weight: 900; 
      margin-bottom: 8px; 
      position: relative; 
      z-index: 1;
      text-shadow: 0 4px 20px rgba(0,0,0,0.4);
      letter-spacing: -1px;
    }
    .header p { 
      opacity: 0.95; 
      font-size: 16px; 
      position: relative; 
      z-index: 1;
      font-weight: 500;
    }
    
    /* Actions bar glassmorphism */
    .actions-bar {
      margin: -100px 16px 16px;
      padding: 16px 20px;
      background: rgba(30,30,30,0.85);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border-radius: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid rgba(255,255,255,0.15);
      box-shadow: 
        0 10px 40px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.1);
      position: relative;
      z-index: 10;
    }
    .status-info { display: flex; align-items: center; gap: 10px; }
    .status-dot { 
      width: 10px; 
      height: 10px; 
      border-radius: 50%; 
      background: #1DB954;
      box-shadow: 0 0 15px #1DB954;
      animation: glow 2s ease-in-out infinite;
    }
    @keyframes glow {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.2); }
    }
    .status-text { font-size: 14px; font-weight: 600; }
    .action-btn {
      background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0.05) 100%);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.2);
      padding: 11px 15px;
      border-radius: 12px;
      font-size: 17px;
      cursor: pointer;
      margin-left: 8px;
      transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    .action-btn:active { 
      transform: scale(0.9); 
      background: #1DB954;
      border-color: #1DB954;
    }
    
    /* View toggle premium */
    .view-toggle {
      margin: 0 16px 16px;
      display: flex;
      gap: 8px;
      background: rgba(30,30,30,0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 6px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .view-btn {
      flex: 1;
      padding: 14px 20px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      background: transparent;
      color: #666;
      transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    .view-btn.active {
      background: linear-gradient(135deg, #1DB954 0%, #1ed760 100%);
      color: #000;
      box-shadow: 0 6px 20px rgba(29,185,84,0.5);
      transform: translateY(-2px);
    }
    .view-btn:active { transform: scale(0.96); }
    
    /* Month selector premium */
    .month-selector {
      margin: 0 16px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: linear-gradient(135deg, rgba(40,40,40,0.9) 0%, rgba(20,20,20,0.9) 100%);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 18px 20px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    }
    .month-selector button {
      background: linear-gradient(135deg, #1DB954 0%, #1ed760 100%);
      color: #000;
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
      box-shadow: 0 6px 20px rgba(29,185,84,0.5);
    }
    .month-selector button:active { transform: scale(0.85); }
    .month-selector span { font-weight: 700; font-size: 16px; text-transform: capitalize; }
    
    /* Summary premium */
    .summary {
      margin: 0 16px 16px;
      padding: 24px;
      background: linear-gradient(135deg, rgba(40,40,40,0.95) 0%, rgba(20,20,20,0.95) 100%);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }
    .summary h2 { 
      font-size: 14px; 
      color: #888; 
      margin-bottom: 18px; 
      text-transform: uppercase; 
      letter-spacing: 1.5px;
      font-weight: 700;
    }
    .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .summary-item { 
      text-align: center; 
      padding: 20px 12px; 
      background: linear-gradient(135deg, rgba(10,10,10,0.9) 0%, rgba(25,25,25,0.9) 100%);
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.08);
      transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
      position: relative;
      overflow: hidden;
    }
    .summary-item::before {
      content: '';
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .summary-item:active::before { opacity: 1; }
    .summary-item:active { transform: scale(0.95); }
    .summary-item .number { 
      font-size: 36px; 
      font-weight: 900; 
      display: block; 
      margin-bottom: 6px;
      position: relative;
      z-index: 1;
    }
    .summary-item .label { 
      font-size: 10px; 
      color: #666; 
      text-transform: uppercase; 
      letter-spacing: 1px;
      position: relative;
      z-index: 1;
      font-weight: 700;
    }
    .summary-item.paid .number { 
      color: #1DB954;
      text-shadow: 0 0 30px rgba(29,185,84,0.6);
    }
    .summary-item.pending .number { 
      color: #ff4757;
      text-shadow: 0 0 30px rgba(255,71,87,0.6);
    }
    .summary-item.advance .number { 
      color: #3498db;
      text-shadow: 0 0 30px rgba(52,152,219,0.6);
    }
    
    /* Progress bars premium */
    .progress-section { margin: 0 16px 16px; }
    .progress-item { margin-bottom: 14px; }
    .progress-header { 
      display: flex; 
      justify-content: space-between; 
      margin-bottom: 10px; 
      font-size: 13px; 
      font-weight: 700; 
      color: #999;
    }
    .progress-bar { 
      height: 10px; 
      background: rgba(255,255,255,0.08); 
      border-radius: 8px; 
      overflow: hidden;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
    }
    .progress-fill { 
      height: 100%; 
      border-radius: 8px; 
      transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
      position: relative;
      overflow: hidden;
    }
    .progress-fill::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.25) 50%, transparent 100%);
      animation: shimmer 2s ease-in-out infinite;
    }
    @keyframes shimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }
    .progress-fill.paid { 
      background: linear-gradient(90deg, #1DB954 0%, #1ed760 100%);
      box-shadow: 0 0 20px rgba(29,185,84,0.6);
    }
    .progress-fill.pending { 
      background: linear-gradient(90deg, #ff4757 0%, #ff6b7a 100%);
      box-shadow: 0 0 20px rgba(255,71,87,0.6);
    }
    
    /* Quick actions premium */
    .quick-actions {
      margin: 0 16px 16px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .quick-action-btn {
      background: linear-gradient(135deg, rgba(40,40,40,0.9) 0%, rgba(25,25,25,0.9) 100%);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 18px 12px;
      border-radius: 16px;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .quick-action-btn:active { 
      transform: scale(0.92); 
      background: linear-gradient(135deg, #1DB954 0%, #1ed760 100%);
      color: #000;
      border-color: #1DB954;
    }
    .quick-action-btn span { font-size: 28px; }
    
    /* Member card premium */
    .member-card {
      margin: 0 16px 14px;
      background: linear-gradient(135deg, rgba(40,40,40,0.98) 0%, rgba(18,18,18,0.98) 100%);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border-radius: 20px;
      padding: 22px;
      border: 1px solid rgba(255,255,255,0.1);
      transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
      animation: cardSlideUp 0.5s cubic-bezier(0.4,0,0.2,1) backwards;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }
    .member-card:nth-child(1) { animation-delay: 0.05s; }
    .member-card:nth-child(2) { animation-delay: 0.1s; }
    .member-card:nth-child(3) { animation-delay: 0.15s; }
    .member-card:nth-child(4) { animation-delay: 0.2s; }
    .member-card:nth-child(5) { animation-delay: 0.25s; }
    @keyframes cardSlideUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .member-card:active { transform: scale(0.97); }
    .member-header { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      margin-bottom: 18px;
    }
    .member-name { 
      font-size: 22px; 
      font-weight: 800;
      background: linear-gradient(135deg, #fff 0%, #ccc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .member-total { font-size: 13px; color: #777; margin-top: 5px; font-weight: 500; }
    .member-total strong { color: #1DB954; font-weight: 700; }
    .status-badge { 
      padding: 8px 16px; 
      border-radius: 24px; 
      font-size: 11px; 
      font-weight: 800; 
      text-transform: uppercase;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    .status-paid { 
      background: linear-gradient(135deg, #1DB954 0%, #1ed760 100%);
      color: #000;
      box-shadow: 0 6px 20px rgba(29,185,84,0.5);
    }
    .status-pending { 
      background: linear-gradient(135deg, #ff4757 0%, #ff6b7a 100%);
      color: #fff;
      box-shadow: 0 6px 20px rgba(255,71,87,0.5);
    }
    .status-advance { 
      background: linear-gradient(135deg, #3498db 0%, #5dade2 100%);
      color: #fff;
      box-shadow: 0 6px 20px rgba(52,152,219,0.5);
    }
    
    .payment-info {
      background: linear-gradient(135deg, rgba(10,10,10,0.9) 0%, rgba(25,25,25,0.9) 100%);
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 18px;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .payment-info p { 
      font-size: 14px; 
      color: #999; 
      margin-bottom: 11px; 
      display: flex; 
      align-items: center; 
      gap: 10px;
      font-weight: 500;
    }
    .payment-info p:last-child { margin-bottom: 0; }
    .payment-info strong { color: #fff; font-weight: 700; }
    
    /* Buttons premium */
    .btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 10px;
    }
    .btn-pay { 
      background: linear-gradient(135deg, #1DB954 0%, #1ed760 100%);
      color: #000;
      box-shadow: 0 8px 25px rgba(29,185,84,0.5);
    }
    .btn-pay:active { transform: scale(0.96); }
    .btn-whatsapp {
      background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
      color: #fff;
      box-shadow: 0 8px 25px rgba(37,211,102,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-whatsapp:active { transform: scale(0.96); }
    .btn-reset { 
      background: transparent;
      border: 2px solid rgba(255,71,87,0.4);
      color: #ff4757;
    }
    .btn-reset:active { background: #ff4757; color: #fff; border-color: #ff4757; }
    
    /* Year selector premium */
    .year-selector {
      margin: 0 16px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: linear-gradient(135deg, rgba(40,40,40,0.95) 0%, rgba(20,20,20,0.95) 100%);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      padding: 18px 20px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    }
    .year-selector button {
      background: linear-gradient(135deg, #1DB954 0%, #1ed760 100%);
      color: #000;
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      font-size: 20px;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(29,185,84,0.5);
    }
    .year-selector span { font-weight: 800; font-size: 20px; }
    
    /* Stats cards premium */
    .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin: 0 16px 16px; }
    .stat-card { 
      background: linear-gradient(135deg, rgba(40,40,40,0.98) 0%, rgba(18,18,18,0.98) 100%);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border-radius: 18px;
      padding: 20px;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      transition: all 0.3s;
      animation: statPop 0.5s cubic-bezier(0.4,0,0.2,1) backwards;
    }
    .stat-card:nth-child(1) { animation-delay: 0.05s; }
    .stat-card:nth-child(2) { animation-delay: 0.1s; }
    .stat-card:nth-child(3) { animation-delay: 0.15s; }
    .stat-card:nth-child(4) { animation-delay: 0.2s; }
    @keyframes statPop {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
    .stat-card:active { transform: scale(0.96); }
    .stat-card .label { font-size: 10px; color: #777; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; font-weight: 700; }
    .stat-card .value { font-size: 28px; font-weight: 900; line-height: 1; }
    .stat-card .value.green { 
      color: #1DB954;
      text-shadow: 0 0 30px rgba(29,185,84,0.6);
    }
    .stat-card .value.blue { 
      color: #3498db;
      text-shadow: 0 0 30px rgba(52,152,219,0.6);
    }
    .stat-card .value.purple { 
      color: #9b59b6;
      text-shadow: 0 0 30px rgba(155,89,182,0.6);
    }
    
    /* Chart premium */
    .charts-section { margin: 0 16px 16px; }
    .chart-card {
      background: linear-gradient(135deg, rgba(40,40,40,0.98) 0%, rgba(18,18,18,0.98) 100%);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border-radius: 20px;
      padding: 22px;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }
    .chart-card h3 {
      font-size: 14px;
      margin-bottom: 18px;
      color: #888;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .chart-container { position: relative; height: 220px; }
    
    /* Yearly grid premium */
    .yearly-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin: 0 16px 16px; }
    .yearly-member {
      background: linear-gradient(135deg, rgba(40,40,40,0.98) 0%, rgba(18,18,18,0.98) 100%);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border-radius: 18px;
      padding: 20px;
      border: 1px solid rgba(255,255,255,0.1);
      animation: cardSlideUp 0.5s cubic-bezier(0.4,0,0.2,1) backwards;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }
    .yearly-member:nth-child(1) { animation-delay: 0.05s; }
    .yearly-member:nth-child(2) { animation-delay: 0.1s; }
    .yearly-member:nth-child(3) { animation-delay: 0.15s; }
    .yearly-member:nth-child(4) { animation-delay: 0.2s; }
    .yearly-member:nth-child(5) { animation-delay: 0.25s; }
    .yearly-member h3 { 
      font-size: 17px; 
      margin-bottom: 14px;
      background: linear-gradient(135deg, #fff 0%, #ccc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 700;
    }
    .yearly-stats { display: flex; gap: 8px; font-size: 11px; color: #777; flex-wrap: wrap; }
    .yearly-stats span { 
      background: linear-gradient(135deg, rgba(10,10,10,0.9) 0%, rgba(25,25,25,0.9) 100%);
      padding: 10px 14px; 
      border-radius: 10px; 
      border: 1px solid rgba(255,255,255,0.08);
      font-weight: 700;
    }
    .yearly-stats strong { 
      color: #1DB954;
      font-size: 18px;
      text-shadow: 0 0 20px rgba(29,185,84,0.5);
    }
    
    /* Modal premium */
    .modal { 
      display: none; 
      position: fixed; 
      top: 0; left: 0; right: 0; bottom: 0; 
      background: rgba(0,0,0,0.95);
      z-index: 1000; 
      align-items: flex-end; 
      justify-content: center;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .modal.active { display: flex; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal-content {
      background: linear-gradient(180deg, #2a2a2a 0%, #1a1a1a 100%);
      border-radius: 26px 26px 0 0;
      padding: 32px 26px;
      width: 100%;
      max-width: 520px;
      animation: slideUpModal 0.4s cubic-bezier(0.4,0,0.2,1);
      border-top: 1px solid rgba(255,255,255,0.15);
      box-shadow: 0 -10px 50px rgba(0,0,0,0.8);
    }
    @keyframes slideUpModal {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    .modal-content h3 { 
      margin-bottom: 26px; 
      font-size: 24px; 
      font-weight: 800;
      background: linear-gradient(135deg, #fff 0%, #ccc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .modal-content label { 
      display: block; 
      margin-bottom: 11px; 
      font-size: 12px; 
      color: #777; 
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .modal-content input, .modal-content select {
      width: 100%;
      padding: 17px;
      border: 2px solid rgba(255,255,255,0.15);
      border-radius: 14px;
      font-size: 16px;
      margin-bottom: 18px;
      background: rgba(10,10,10,0.9);
      color: #fff;
      transition: all 0.3s;
      font-weight: 600;
    }
    .modal-content input:focus, .modal-content select:focus {
      outline: none;
      border-color: #1DB954;
      box-shadow: 0 0 0 4px rgba(29,185,84,0.15);
    }
    .modal-content input[type="number"] { font-size: 20px; font-weight: 800; }
    .modal-actions { display: flex; gap: 12px; margin-top: 26px; }
    .modal-actions button { 
      flex: 1; 
      padding: 17px; 
      border: none; 
      border-radius: 14px; 
      font-size: 15px; 
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      transition: all 0.3s;
    }
    .btn-cancel { background: rgba(255,255,255,0.15); color: #fff; }
    .btn-cancel:active { transform: scale(0.94); }
    .btn-confirm { 
      background: linear-gradient(135deg, #1DB954 0%, #1ed760 100%);
      color: #000;
      box-shadow: 0 8px 25px rgba(29,185,84,0.5);
    }
    .btn-confirm:active { transform: scale(0.96); }
    
    /* Loading premium */
    .loading-overlay { 
      position: fixed; 
      top: 0; left: 0; right: 0; bottom: 0; 
      background: rgba(0,0,0,0.95);
      z-index: 2000; 
      display: none; 
      align-items: center; 
      justify-content: center; 
      flex-direction: column; 
      gap: 26px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .loading-overlay.active { display: flex; animation: fadeIn 0.3s ease; }
    .spinner {
      width: 54px;
      height: 54px;
      border: 4px solid rgba(255,255,255,0.08);
      border-top-color: #1DB954;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      box-shadow: 0 0 30px rgba(29,185,84,0.4);
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { 
      color: #fff; 
      font-size: 15px; 
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }
    
    /* Empty state */
    .empty-state { text-align: center; padding: 100px 20px; color: #666; animation: fadeIn 0.5s ease; }
    .empty-state-icon { font-size: 72px; margin-bottom: 24px; opacity: 0.4; }
    .empty-state h3 { font-size: 21px; margin-bottom: 14px; color: #888; font-weight: 800; }
    .empty-state p { font-size: 14px; color: #666; }
  </style>
</head>
<body>
  <div class="bg-animation"></div>

  <div class="header">
    <h1>🎵 Spotify</h1>
    <p>Plan Familiar</p>
  </div>

  <div class="actions-bar">
    <div class="status-info">
      <span class="status-dot" id="statusDot"></span>
      <span class="status-text" id="statusText">Cargando...</span>
    </div>
    <div>
      <button class="action-btn" onclick="refreshData()" title="Actualizar">🔄</button>
      <button class="action-btn" onclick="exportCSV()" title="Exportar">📤</button>
    </div>
  </div>

  <div class="view-toggle">
    <button class="view-btn active" id="btnMonthly" onclick="setView('monthly')">📅 Mensual</button>
    <button class="view-btn" id="btnYearly" onclick="setView('yearly')">📊 Anual</button>
  </div>

  <!-- Vista Mensual -->
  <div id="monthlyView">
    <div class="month-selector">
      <button onclick="changeMonth(-1)">◀</button>
      <span id="currentMonth"></span>
      <button onclick="changeMonth(1)">▶</button>
    </div>

    <div class="summary">
      <h2>📊 Resumen</h2>
      <div class="summary-grid">
        <div class="summary-item paid">
          <span class="number" id="paidCount">-</span>
          <span class="label">Pagados</span>
        </div>
        <div class="summary-item pending">
          <span class="number" id="pendingCount">-</span>
          <span class="label">Pendientes</span>
        </div>
        <div class="summary-item advance">
          <span class="number" id="advanceCount">-</span>
          <span class="label">Adelanto</span>
        </div>
      </div>
    </div>

    <!-- Progress -->
    <div class="progress-section">
      <div class="progress-item">
        <div class="progress-header"><span>🟢 Pagados</span><span id="progressPaidText">0%</span></div>
        <div class="progress-bar"><div class="progress-fill paid" id="progressPaid" style="width:0%"></div></div>
      </div>
      <div class="progress-item">
        <div class="progress-header"><span>🔴 Pendientes</span><span id="progressPendingText">0%</span></div>
        <div class="progress-bar"><div class="progress-fill pending" id="progressPending" style="width:0%"></div></div>
      </div>
    </div>

    <!-- Quick actions -->
    <div class="quick-actions">
      <button class="quick-action-btn" onclick="openModal('Rubén')"><span>👤</span>Rubén</button>
      <button class="quick-action-btn" onclick="openModal('María')"><span>👤</span>María</button>
      <button class="quick-action-btn" onclick="openModal('Litri')"><span>👤</span>Litri</button>
      <button class="quick-action-btn" onclick="openModal('Kika')"><span>👤</span>Kika</button>
      <button class="quick-action-btn" onclick="openModal('Gordi')"><span>👤</span>Gordi</button>
      <button class="quick-action-btn" onclick="refreshData()"><span>🔄</span>Actualizar</button>
    </div>

    <div id="membersList"></div>
  </div>

  <!-- Vista Anual -->
  <div id="yearlyView" style="display:none;">
    <div class="year-selector">
      <button onclick="changeYear(-1)">◀</button>
      <span id="currentYear"></span>
      <button onclick="changeYear(1)">▶</button>
    </div>
    
    <div class="stats-grid">
      <div class="stat-card"><div class="label">Total Pagos</div><div class="value green" id="yearTotalPayments">0</div></div>
      <div class="stat-card"><div class="label">Total Meses</div><div class="value blue" id="yearTotalMonths">0</div></div>
      <div class="stat-card"><div class="label">Mejor Pagador</div><div class="value purple" id="yearBestPayer">-</div></div>
      <div class="stat-card"><div class="label">Recaudado</div><div class="value green" id="yearCollected">0€</div></div>
    </div>
    
    <div class="charts-section">
      <div class="chart-card">
        <h3>📊 Pagos por Persona</h3>
        <div class="chart-container"><canvas id="yearlyChart"></canvas></div>
      </div>
    </div>
    
    <div class="yearly-grid" id="yearlyList"></div>
  </div>

  <!-- Modal -->
  <div class="modal" id="paymentModal">
    <div class="modal-content">
      <h3 id="modalTitle">Registrar Pago</h3>
      <label>Fecha</label>
      <input type="date" id="paymentDate">
      <label>Meses (1-24)</label>
      <input type="number" id="paymentMonths" value="1" min="1" max="24">
      <label>Método</label>
      <select id="paymentMethod">
        <option value="Bizum">💚 Bizum</option>
        <option value="Transferencia">💳 Transferencia</option>
        <option value="Efectivo">💵 Efectivo</option>
        <option value="Otro">📝 Otro</option>
      </select>
      <label>Notas</label>
      <input type="text" id="paymentNotes" placeholder="Opcional">
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
        <button class="btn-confirm" onclick="confirmPayment()">Confirmar</button>
      </div>
    </div>
  </div>

  <!-- Loading -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-text" id="loadingText">Guardando...</div>
  </div>

  <script>
    const API_URL = window.location.hostname === 'localhost' ? 'http://localhost:3000/api' : `${window.location.protocol}//${window.location.hostname}/api`;
    const members = ['Rubén', 'María', 'Litri', 'Kika', 'Gordi'];
    // Teléfonos de WhatsApp
    const memberPhones = {
      'Rubén': '34626316772',
      'María': '34616780137',
      'Litri': '34618169551',
      'Kika': '34685378134',
      'Gordi': '34689362213'
    };
    const PRICE_PER_MONTH = 3.50;
    
    let currentDate = new Date();
    let currentYear = new Date().getFullYear();
    let selectedMember = null;
    let allPayments = [];
    let yearlyChart = null;

    // Cargar datos
    async function loadData() {
      try {
        const res = await fetch(`${API_URL}/payments`);
        if (!res.ok) throw new Error('Error');
        const data = await res.json();
        allPayments = data.map(p => ({ ...p, payment_date: new Date(p.payment_date) }));
        document.getElementById('statusDot').style.background = '#1DB954';
        document.getElementById('statusText').textContent = 'Conectado';
        if (document.getElementById('monthlyView').style.display !== 'none') {
          renderMembers();
        } else {
          renderYearly();
        }
      } catch (err) {
        document.getElementById('statusDot').style.background = '#ff4757';
        document.getElementById('statusText').textContent = 'Error';
      }
    }

    // Refresh manual
    async function refreshData() {
      document.getElementById('loadingText').textContent = 'Actualizando...';
      document.getElementById('loadingOverlay').classList.add('active');
      await loadData();
      document.getElementById('loadingOverlay').classList.remove('active');
    }

    // Cambiar vista
    function setView(view) {
      const monthlyView = document.getElementById('monthlyView');
      const yearlyView = document.getElementById('yearlyView');
      const btnMonthly = document.getElementById('btnMonthly');
      const btnYearly = document.getElementById('btnYearly');
      
      if (view === 'monthly') {
        monthlyView.style.display = 'block';
        yearlyView.style.display = 'none';
        btnMonthly.classList.add('active');
        btnYearly.classList.remove('active');
        renderMembers();
      } else {
        monthlyView.style.display = 'none';
        yearlyView.style.display = 'block';
        btnMonthly.classList.remove('active');
        btnYearly.classList.add('active');
        renderYearly();
      }
      window.scrollTo(0, 0);
    }

    // Calcular meses cubiertos por adelanto en un mes específico
    function getAdvanceForMonth(memberPayments, targetYear, targetMonth) {
      // targetMonth es 0-indexed (0=enero, 11=diciembre)
      let advanceCount = 0;
      
      // Ordenar pagos por fecha
      const sorted = [...memberPayments].sort((a, b) => {
        const aDate = a.payment_date instanceof Date ? a.payment_date : new Date(a.payment_date);
        const bDate = b.payment_date instanceof Date ? b.payment_date : new Date(b.payment_date);
        return aDate - bDate;
      });
      
      // Para cada pago, calcular qué meses cubre
      for (const payment of sorted) {
        const payDate = payment.payment_date instanceof Date ? payment.payment_date : new Date(payment.payment_date);
        const payYear = payDate.getFullYear();
        const payMonth = payDate.getMonth(); // 0-indexed
        const monthsPaid = payment.months || 1;
        
        // Este pago cubre desde payMonth hasta payMonth + monthsPaid - 1
        const firstMonth = { year: payYear, month: payMonth };
        const lastMonth = { year: payYear, month: payMonth + monthsPaid - 1 };
        
        // Normalizar lastMonth si cruza año
        let actualLastYear = lastMonth.year;
        let actualLastMonth = lastMonth.month;
        while (actualLastMonth > 11) {
          actualLastYear++;
          actualLastMonth -= 12;
        }
        
        // Check if target month is covered by this payment
        const targetTotalMonths = targetYear * 12 + targetMonth;
        const firstTotalMonths = firstMonth.year * 12 + firstMonth.month;
        const lastTotalMonths = actualLastYear * 12 + actualLastMonth;
        
        if (targetTotalMonths >= firstTotalMonths && targetTotalMonths <= lastTotalMonths) {
          // Este mes está cubierto por este pago
          // Calcular cuántos meses de adelanto quedan DESPUÉS del mes target
          const remainingMonths = lastTotalMonths - targetTotalMonths;
          if (remainingMonths > 0) {
            advanceCount = Math.max(advanceCount, remainingMonths);
          }
        }
      }
      
      return advanceCount;
    }

    // Verificar si un mes está cubierto por algún pago (incluyendo adelantos que se agotan)
    function isMonthCovered(memberPayments, targetYear, targetMonth) {
      const targetTotalMonths = targetYear * 12 + targetMonth;
      
      for (const payment of memberPayments) {
        const payDate = payment.payment_date instanceof Date ? payment.payment_date : new Date(payment.payment_date);
        const payYear = payDate.getFullYear();
        const payMonth = payDate.getMonth();
        const monthsPaid = payment.months || 1;
        
        const firstTotalMonths = payYear * 12 + payMonth;
        const lastTotalMonths = payYear * 12 + (payMonth + monthsPaid - 1);
        
        if (targetTotalMonths >= firstTotalMonths && targetTotalMonths <= lastTotalMonths) {
          return true;
        }
      }
      
      return false;
    }

    // Render mensual
    function renderMembers() {
      const monthKey = `${currentDate.getFullYear()}-${String(currentDate.getMonth()+1).padStart(2,'0')}`;
      const currentYear = currentDate.getFullYear();
      const currentMonth = currentDate.getMonth(); // 0-indexed
      const container = document.getElementById('membersList');
      let html = '';

      members.forEach(member => {
        const memberPayments = allPayments.filter(p => p.member === member);
        const monthPayments = memberPayments.filter(p => {
          const d = p.payment_date instanceof Date ? p.payment_date : new Date(p.payment_date);
          return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}` === monthKey;
        });
        const latestPayment = monthPayments.length > 0 ? monthPayments[monthPayments.length - 1] : null;
        
        // Calcular adelanto REAL para el mes actual (meses que quedan DESPUÉS de este mes)
        const advanceMonths = getAdvanceForMonth(memberPayments, currentYear, currentMonth);
        const totalPaid = memberPayments.reduce((sum, p) => sum + (p.months || 1), 0);
        
        // Verificar si el mes actual está cubierto (por pago este mes O por adelanto)
        const isCovered = isMonthCovered(memberPayments, currentYear, currentMonth);

        let status = 'pending', statusText = 'Pendiente';
        if (advanceMonths > 0) { 
          status = 'advance'; 
          statusText = `${advanceMonths} meses adel.`; 
        } else if (isCovered || latestPayment) { 
          status = 'paid'; 
          statusText = 'Pagado'; 
        }

        html += `<div class="member-card">
          <div class="member-header">
            <div><div class="member-name">${member}</div><div class="member-total">Total: <strong>${totalPaid}</strong> meses</div></div>
            <span class="status-badge status-${status}">${statusText}</span>
          </div>`;
        
        if (latestPayment || advanceMonths > 0) {
          html += `<div class="payment-info">`;
          if (latestPayment) {
            const d = latestPayment.payment_date instanceof Date ? latestPayment.payment_date : new Date(latestPayment.payment_date);
            html += `<p>📅 <strong>${d.toLocaleDateString('es-ES', {day:'numeric',month:'short',year:'numeric'})}</strong></p>`;
            html += `<p>💰 <strong>${latestPayment.months === 1 ? 'Este mes' : latestPayment.months + ' meses'}</strong></p>`;
            if (latestPayment.method) html += `<p>🏦 <strong>${latestPayment.method}</strong></p>`;
          }
          if (advanceMonths > 0) html += `<p>📅 <strong>${advanceMonths} meses adelantados</strong></p>`;
          html += `</div>`;
        } else {
          html += `<div class="payment-info"><p style="color:#666;">Sin pagos registrados</p></div>`;
        }

        html += `<button class="btn btn-pay" onclick="openModal('${member}')">${latestPayment || advanceMonths > 0 ? '✅ Registrar otro' : '💰 Registrar pago'}</button>`;
        
        // Botón WhatsApp - solo si está pendiente (sin pago este mes y sin adelanto)
        if (!latestPayment && advanceMonths === 0) {
          const phone = memberPhones[member] || '34600000000';
          const message = encodeURIComponent(`Hola ${member} 👋\n\nTe recuerdo que debes el pago de Spotify de este mes (${PRICE_PER_MONTH.toFixed(2)}€).\n\n¿Cuándo puedes hacerme un Bizum?\n\nGracias! 🎵`);
          html += `<a href="https://wa.me/${phone}?text=${message}" target="_blank" style="text-decoration:none;"><button class="btn btn-whatsapp">💬 Avisar por WhatsApp</button></a>`;
        }
        
        if (memberPayments.length > 0) html += `<button class="btn btn-reset" onclick="resetMember('${member}')">🔄 Resetear</button>`;
        html += `</div>`;
      });

      container.innerHTML = html;
      updateSummary();
    }

    // Render anual
    function renderYearly() {
      const container = document.getElementById('yearlyList');
      let html = '';
      let totalPayments = 0, totalMonths = 0, bestPayer = '-', maxMonths = 0;
      const memberStats = {};

      members.forEach(member => {
        const memberPayments = allPayments.filter(p => {
          const d = p.payment_date instanceof Date ? p.payment_date : new Date(p.payment_date);
          return p.member === member && d.getFullYear() === currentYear;
        });
        const mMonths = memberPayments.reduce((sum, p) => sum + (p.months || 1), 0);
        const mPayments = memberPayments.length;
        memberStats[member] = mMonths;
        totalPayments += mPayments;
        totalMonths += mMonths;
        if (mMonths > maxMonths) { maxMonths = mMonths; bestPayer = member; }

        html += `<div class="yearly-member"><h3>${member}</h3><div class="yearly-stats">
          <span>📦 <strong>${mPayments}</strong></span>
          <span>📅 <strong>${mMonths}</strong></span>
        </div></div>`;
      });

      container.innerHTML = html;
      
      // Animar stats cards
      const statsCards = document.querySelectorAll('.stat-card');
      statsCards.forEach((card, i) => {
        card.style.animationDelay = `${i * 0.1}s`;
      });
      
      document.getElementById('yearTotalPayments').textContent = totalPayments;
      document.getElementById('yearTotalMonths').textContent = totalMonths;
      document.getElementById('yearBestPayer').textContent = bestPayer;
      document.getElementById('yearCollected').textContent = (totalMonths * PRICE_PER_MONTH).toFixed(2) + '€';

      // Gráfica
      setTimeout(() => {
        const ctx = document.getElementById('yearlyChart').getContext('2d');
        if (yearlyChart) yearlyChart.destroy();
        yearlyChart = new Chart(ctx, {
          type: 'bar',
          data: {
            labels: members,
            datasets: [{
              data: members.map(m => memberStats[m] || 0),
              backgroundColor: 'rgba(29,185,84,0.9)',
              borderColor: '#1DB954',
              borderWidth: 2,
              borderRadius: 8
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
              y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.06)' }, ticks: { color: '#888', stepSize: 1 } },
              x: { grid: { display: false }, ticks: { color: '#888' } }
            },
            animation: { duration: 800, easing: 'easeOutQuart' }
          }
        });
      }, 50);
    }

    // Actualizar resumen
    function updateSummary() {
      const monthKey = `${currentDate.getFullYear()}-${String(currentDate.getMonth()+1).padStart(2,'0')}`;
      const currentYear = currentDate.getFullYear();
      const currentMonth = currentDate.getMonth();
      let paid = 0, pending = 0, advance = 0;

      members.forEach(member => {
        const memberPayments = allPayments.filter(p => p.member === member);
        // Calcular adelanto REAL para este mes (meses que quedan después de este mes)
        const advanceMonths = getAdvanceForMonth(memberPayments, currentYear, currentMonth);
        // Verificar si hay pago registrado este mes
        const monthPayments = memberPayments.filter(p => {
          const d = p.payment_date instanceof Date ? p.payment_date : new Date(p.payment_date);
          return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}` === monthKey;
        });
        // Verificar si el mes está cubierto por algún pago (incluyendo adelantos)
        const isCovered = isMonthCovered(memberPayments, currentYear, currentMonth);
        
        // Clasificar para conteo individual
        if (advanceMonths > 0) { 
          advance++;
          paid++; // Los adelantos TAMBIÉN cuentan como pagados para la barra de progreso
        } else if (isCovered || monthPayments.length > 0) { 
          paid++;
        } else { 
          pending++;
        }
      });

      document.getElementById('paidCount').textContent = paid;
      document.getElementById('pendingCount').textContent = pending;
      document.getElementById('advanceCount').textContent = advance;

      // Para la barra de progreso: pagados incluye adelantos (100% = todos cubiertos)
      const total = members.length;
      const coveredCount = paid; // paid ya incluye adelantos
      const pendingCount = pending;
      const coveredPct = total > 0 ? Math.round((coveredCount / total) * 100) : 0;
      const pendingPct = total > 0 ? Math.round((pendingCount / total) * 100) : 0;
      
      document.getElementById('progressPaid').style.width = coveredPct + '%';
      document.getElementById('progressPaidText').textContent = coveredPct + '%';
      document.getElementById('progressPending').style.width = pendingPct + '%';
      document.getElementById('progressPendingText').textContent = pendingPct + '%';
    }

    // Cambiar mes/año
    function changeMonth(delta) {
      currentDate.setMonth(currentDate.getMonth() + delta);
      document.getElementById('currentMonth').textContent = currentDate.toLocaleDateString('es-ES', { month: 'long', year: 'numeric' });
      renderMembers();
    }
    function changeYear(delta) {
      currentYear += delta;
      document.getElementById('currentYear').textContent = currentYear;
      renderYearly();
    }

    // Modal
    function openModal(member) {
      selectedMember = member;
      document.getElementById('modalTitle').textContent = `Registrar pago - ${member}`;
      document.getElementById('paymentDate').value = new Date().toISOString().split('T')[0];
      document.getElementById('paymentMonths').value = '1';
      document.getElementById('paymentModal').classList.add('active');
    }
    function closeModal() { document.getElementById('paymentModal').classList.remove('active'); selectedMember = null; }

    // Confirmar pago
    async function confirmPayment() {
      const date = document.getElementById('paymentDate').value;
      const months = parseInt(document.getElementById('paymentMonths').value);
      const method = document.getElementById('paymentMethod').value;
      const notes = document.getElementById('paymentNotes').value;

      if (!date || !selectedMember) return;

      document.getElementById('loadingText').textContent = 'Guardando...';
      document.getElementById('loadingOverlay').classList.add('active');

      try {
        await fetch(`${API_URL}/payments`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ member: selectedMember, payment_date: date, months, method, notes })
        });
        await loadData();
        closeModal();
      } catch (err) {
        alert('Error: ' + err.message);
      } finally {
        document.getElementById('loadingOverlay').classList.remove('active');
      }
    }

    // Resetear miembro
    async function resetMember(member) {
      if (confirm(`¿Borrar todos los pagos de ${member}?`)) {
        document.getElementById('loadingText').textContent = 'Eliminando...';
        document.getElementById('loadingOverlay').classList.add('active');
        try {
          await fetch(`${API_URL}/payments/member/${encodeURIComponent(member)}`, { method: 'DELETE' });
          await loadData();
        } catch (err) {
          alert('Error: ' + err.message);
        } finally {
          document.getElementById('loadingOverlay').classList.remove('active');
        }
      }
    }

    // Exportar CSV
    function exportCSV() {
      if (allPayments.length === 0) { alert('No hay pagos'); return; }
      const headers = ['ID','Miembro','Fecha','Meses','Método','Notas'];
      const rows = allPayments.map(p => [p.id, p.member, new Date(p.payment_date).toLocaleDateString('es-ES'), p.months, p.method||'-', p.notes||'-'].join(';'));
      const csv = [headers.join(';'), ...rows].join('\n');
      const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = `spotify-pagos-${new Date().toISOString().split('T')[0]}.csv`;
      link.click();
    }

    // Inicializar
    document.getElementById('currentMonth').textContent = currentDate.toLocaleDateString('es-ES', { month: 'long', year: 'numeric' });
    document.getElementById('currentYear').textContent = currentYear;
    loadData();
  </script>
</body>
</html>
