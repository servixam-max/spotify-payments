version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: spotify-payments-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: spotify_payments
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: spotify2024
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - spotify_network

  api:
    image: node:20-alpine
    container_name: spotify-payments-api
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install && npm start"
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://admin:spotify2024@postgres:5432/spotify_payments
    volumes:
      - ./api:/app
    depends_on:
      - postgres
    networks:
      - spotify_network

  web:
    image: nginx:alpine
    container_name: spotify-payments-web
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    networks:
      - spotify_network

volumes:
  postgres_data:

networks:
  spotify_network:
    driver: bridge
